    window.startSeed = async function() {
      const status = document.getElementById('status');
      const btn = document.querySelector('button');
      btn.disabled = true;
      btn.textContent = '진행 중...';

      let success = 0, fail = 0;
      const BATCH_SIZE = 500; // Firestore 배치 최대 500개

      for (let i = 0; i < N1_WORDS.length; i += BATCH_SIZE) {
        const chunk = N1_WORDS.slice(i, i + BATCH_SIZE);
        const batch = writeBatch(db);

        chunk.forEach(w => {
          const ref = doc(collection(db, 'words'));
          batch.set(ref, {
            kanji: w[0],
            reading: w[1],
            meaning: w[2],
            level: 'N1',
            createdAt: serverTimestamp()
          });
        });

        try {
          await batch.commit();
          success += chunk.length;
        } catch(e) {
          fail += chunk.length;
          console.error(e);
        }

        status.innerHTML = `<span class="progress">${Math.min(i + BATCH_SIZE, N1_WORDS.length)} / ${N1_WORDS.length} 처리 중... ✓${success} ✗${fail}</span>`;
        await new Promise(r => setTimeout(r, 300));
      }

      status.innerHTML = `<span class="done">🎉 완료! ${success}개 추가, ${fail}개 실패</span>`;
      btn.textContent = '완료!';
    };
  </script>
